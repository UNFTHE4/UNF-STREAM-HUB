<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex">
    <title>UNF STREAM HUB</title>
    <link href='https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css' rel='stylesheet'/>
    <script src='https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js'></script>
    <style>
        body { margin:0; padding:0; background:#0b0c10; font-family:sans-serif; color:#fff; overflow-x: hidden; }
        :root { --mint: #00ff66; --panel: #11141a; --red: #ff4757; }
        #welcome-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: url('https://i.ibb.co.com/vvCwyJG5/WC-1.png') center/cover; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .welcome-box { background: linear-gradient(135deg, #000, #00ff6611); padding: 40px; border: 2px solid var(--mint); text-align: center; border-radius: 20px; }
        .logo-img { width: 150px; height: auto; margin-bottom: 20px; }
        #passcode-input { background:transparent; border:2px solid var(--mint); color:var(--mint); padding:10px; font-size:1.5rem; text-align:center; width:120px; letter-spacing:8px; margin-top:20px; border-radius:8px; }
        .container { width: 100%; margin: 0 auto; display: none; }
        #video-header { background:#000; position:relative; }
        #player { width:100%; aspect-ratio:16/9; background:#000; }
        .controls { display:flex; justify-content:space-between; align-items:center; padding:15px; }
        .grid { display:grid; gap:10px; padding:15px; grid-template-columns: repeat(3, 1fr); }
        .card { background:var(--panel); padding:15px; border-radius:8px; border:2px solid transparent; cursor:pointer; color: #fff; }
        .card.active { border-color: var(--mint); }
        .card.offline { opacity: 0.5; filter: grayscale(1); }
        .online-text { color: var(--mint); font-weight:bold; }
        .offline-text { color: var(--red); font-weight:bold; }
    </style>
</head>
<body>

<div id='welcome-screen'>
    <div class='welcome-box'>
        <img alt='Logo' class='logo-img' src='https://i.ibb.co.com/Df6zYZTZ/Adobe-Express-file.png'/>
        <div style='font-size:1.5rem; margin-top: 10px;'>UNF STREAM HUB</div>
        <input id='passcode-input' maxlength='4' oninput='checkCode(this.value)' placeholder='••••' type='password'/>
    </div>
</div>

<div class='container' id='main-content'>
    <div id='video-header'>
        <video id='player' playsinline='playsinline'></video>
        <div class='controls'>
            <span id='status-text' style='font-weight:bold;'>SELECT CHANNEL</span>
            <i class='fa-solid fa-expand' onclick='goFullscreen()'></i>
        </div>
        <div class='grid' id='channel-grid'></div>
    </div>
</div>

<script>
    const vid = document.getElementById('player');
    let hls = null;

    function checkCode(val) {
        if (val === "6767") {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }
    }

    function goFullscreen() { if (vid.requestFullscreen) vid.requestFullscreen(); }

    function playHls(url, name) {
        if (hls) hls.destroy();
        if (Hls.isSupported()) {
            hls = new Hls({ xhrSetup: (xhr) => { xhr.setRequestHeader('User-Agent', 'Mozilla/5.0'); }});
            hls.loadSource(url);
            hls.attachMedia(vid);
            hls.on(Hls.Events.MANIFEST_PARSED, () => vid.play());
        } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
            vid.src = url; vid.play();
        }
    }

    const channels = [
      { name: "T SPORTS", url: "https://trs1.aynaott.com/tsports/tracks-v1a1/mono.ts.m3u8", lang: "BAN/ENG", status: "online" },
      { name: "SKY SPORTS MAIN EVENT", url: " paste here ", lang: "ENG", status: "offline" },
      { name: "FANCODE", url: " paste here ", lang: "ENG", status: "starting soon" },
      { name: "ESPN", url: "https://1nyaler.streamhostingcdn.top/stream/97/index.m3u8", lang: "DUT", status: "online" },
      { name: "beIN SPORTS 1", url: "https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8", lang: "FRE", status: "online" },
      { name: "GO 3", url: "https://vibestream.ntechbd.app/proxy?url=https%3A%2F%2Finproviszon.st%2Ffifa-2.m3u8", lang: "ENG", status: "online" },
      { name: "UNITE8 SPORTS 1", url: " paste here ", lang: "HIN", status: "offline" },
      { name: "D SPORTS", url: "https://1nyaler.streamhostingcdn.top/stream/106/index.m3u8", lang: "ENG", status: "online" },
      { name: "beIN SPORTS XTRA", url: "https://bein-esp-xumo.amagi.tv/playlistR1080p.m3u8", lang: "ARA/ENG", status: "online" },
      { name: "beIN SPORTS 8K", url: "https://edge22.776740.ir.cdn.ir/hls2/sport.m3u8", lang: "ENG", status: "online" },
      { name: "DAZN SPORTS", url: "https://1nyaler.streamhostingcdn.top/stream/94/index.m3u8", lang: "SPA", status: "online" },
      { name: "SPORTS TV", url: "https://1nyaler.streamhostingcdn.top/stream/33/index.m3u8", lang: "SPA", status: "online" }
    ];
    const grid = document.getElementById('channel-grid');
    channels.forEach(c => {
        let card = document.createElement('div');
        card.className = `card ${c.status}`;
        card.innerHTML = `<div>${c.name}</div><div class='${c.status}-text'>${c.status.toUpperCase()}</div>`;
        card.onclick = () => {
            document.getElementById('status-text').innerText = c.name;
            playHls(c.url, c.name);
        };
        grid.appendChild(card);
    });
</script>
</body>
</html>
